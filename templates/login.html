{% extends "base.html" %}
{% block title %}SnapLink — Login{% endblock %}
{% block extra_style %}
<style>
body{display:flex;align-items:center;justify-content:center;padding:1rem;}
.auth-card{position:relative;z-index:1;width:100%;max-width:380px;display:flex;flex-direction:column;gap:1.5rem;}
.logo{text-align:center;}
.logo-mark{display:inline-flex;align-items:center;justify-content:center;width:50px;height:50px;border-radius:14px;background:var(--accent-dim);border:1px solid var(--accent-border);margin-bottom:0.8rem;}
.logo-mark svg{width:22px;height:22px;fill:var(--accent);}
h1{font-family:'Syne',sans-serif;font-size:1.9rem;font-weight:800;letter-spacing:-0.03em;text-align:center;}
h1 span{color:var(--accent);}
.sub{font-size:0.85rem;color:var(--muted);text-align:center;}
.form-fields{display:flex;flex-direction:column;gap:1rem;}
.field{display:flex;flex-direction:column;gap:0.45rem;}
.pw-toggle{background:none;border:none;cursor:pointer;color:var(--muted);font-size:0.78rem;padding:0 0 0 8px;font-family:'DM Sans',sans-serif;}
.pw-toggle:hover{color:var(--text);}
.signup-link{font-size:0.82rem;color:var(--muted);text-align:center;}
.signup-link a{color:var(--accent);font-weight:500;}
.signup-link a:hover{text-decoration:underline;}
</style>
{% endblock %}
{% block body %}
<div class="auth-card">
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14.5v-9l6 4.5-6 4.5z"/></svg>
    </div>
    <h1>Snap<span>Link</span></h1>
    <p class="sub">Your private video downloader</p>
  </div>

  {% if error %}
  <div class="alert alert-error">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" style="flex-shrink:0;margin-top:2px"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
    {{ error }}
  </div>
  {% endif %}

  <div class="card">
    <form method="POST" action="/login">
      <div class="form-fields">
        <div class="field">
          <label class="field-label" for="username">Username</label>
          <div class="input-wrap">
            <input type="text" id="username" name="username" placeholder="your_username" autocomplete="username" required>
          </div>
        </div>
        <div class="field">
          <label class="field-label" for="password">Password</label>
          <div class="input-wrap">
            <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
            <button type="button" class="pw-toggle" onclick="togglePw('password',this)">show</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:0.25rem;">Sign in</button>
      </div>
    </form>
  </div>

  <p class="signup-link">Don't have an account? <a href="/signup">Request access</a></p>
</div>
<script>
function togglePw(id,btn){
  const i=document.getElementById(id);
  if(i.type==='password'){i.type='text';btn.textContent='hide';}
  else{i.type='password';btn.textContent='show';}
}
</script>
{% endblock %}
